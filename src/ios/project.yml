name: SnackPilot
options:
  bundleIdPrefix: dev.radaiko
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "2.0.3"
    CURRENT_PROJECT_VERSION: "32"
    SWIFT_VERSION: "5.0"
targets:
  SnackPilot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SnackPilot
    dependencies:
      - framework: Frameworks/SnackPilotCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.radaiko.gourmetclient
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: SnackPilot
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        # Export compliance: the app uses only standard HTTPS/TLS (exempt encryption), so declare
        # NO to skip the export-compliance prompt on every TestFlight/App Store upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Per-accent alternate app icons (themes §6). The four alternates ship in the asset
        # catalog; AppModel.setAccent switches to them via UIApplication.setAlternateIconName.
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIcon-emerald AppIcon-berry AppIcon-golden AppIcon-ocean"
        # Location purpose strings (notifications-location §10). "Always" is required for region
        # monitoring; the geofence is the only location use.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "SnackPilot nutzt deinen Standort, um deinen Firmenstandort zu speichern."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "SnackPilot nutzt deinen Standort, um dich an Bestellungen zu erinnern, wenn du im Büro bist."
        # NOTE (notifications-location §10): UIBackgroundModes is intentionally NOT set. Region
        # monitoring (geofencing) is delivered even when the app is suspended/terminated WITHOUT a
        # background mode — iOS relaunches the app for region crossings. The spec's "location"/
        # "processing" modes are only needed for continuous background updates / the BGTask
        # background sync, which is P2 and not built yet; add them alongside that work.
        # rustls-tls core links no Apple TLS, but reqwest/ring still need libc++.
        OTHER_LDFLAGS: "-lc++"

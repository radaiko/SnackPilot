name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
  schedule:
    # Weekly sweep so new advisories surface even without code changes
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [src/app, src/desktop, tools/icon-tools]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: npm audit (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        run: npm audit --package-lock-only --audit-level=moderate

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit

      - name: cargo audit
        working-directory: src/desktop/src-tauri
        run: cargo audit

name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
  schedule:
    # Weekly sweep so new advisories surface even without code changes
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [src/app, src/desktop, tools/icon-tools]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        run: npm audit --package-lock-only --audit-level=moderate

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        working-directory: src/desktop/src-tauri
        run: cargo audit

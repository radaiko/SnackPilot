name: core-test

# Verifies the Rust core (snackpilot-core): tests, formatting, lints, and that the
# UniFFI facade still generates Swift + Kotlin bindings. The core is the account-ban-
# sensitive heart of the app (docs/requirements/01,02); these checks are the guarantee
# that the fixture-driven scraping behavior matches the spec.

on:
  push:
    branches: [v2, main]
    paths: ["src/core/**", "docs/fixtures/**", ".github/workflows/core-test.yml"]
  pull_request:
    paths: ["src/core/**", "docs/fixtures/**", ".github/workflows/core-test.yml"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: src/core

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/core/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build core (cdylib)
        run: cargo build

      - name: Generate Swift bindings
        run: cargo run --bin uniffi-bindgen -- generate --library target/debug/libsnackpilot_core.so --language swift --out-dir target/bindings-swift

      - name: Generate Kotlin bindings
        run: cargo run --bin uniffi-bindgen -- generate --library target/debug/libsnackpilot_core.so --language kotlin --out-dir target/bindings-kotlin

      - name: Verify binding artifacts exist
        run: |
          test -f target/bindings-swift/snackpilot_core.swift
          test -f target/bindings-kotlin/uniffi/snackpilot_core/snackpilot_core.kt

version: 2
updates:
  # Expo React Native app
  - package-ecosystem: npm
    directory: /src/app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    # Expo SDK packages and React Native must be upgraded together via
    # `npx expo install`, never individually. `exclude-patterns` on the group
    # is not enough — excluded packages get individual PRs instead — so
    # SDK-coupled upgrades are suppressed here. Minor/patch bumps within the
    # current SDK remain allowed (and grouped above).
    ignore:
      - dependency-name: "expo*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest-expo"
        update-types: ["version-update:semver-major"]
      # react-native uses 0.x versioning: minor = breaking, SDK-coupled
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Companion libs (screens, svg, safe-area-context, async-storage, ...)
      # are pinned to SDK-compatible majors by `npx expo install`
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-native-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Desktop wrapper (Tauri CLI)
  - package-ecosystem: npm
    directory: /src/desktop
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-all:
        patterns:
          - "*"

  # Icon generation tooling
  - package-ecosystem: npm
    directory: /tools/icon-tools
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-all:
        patterns:
          - "*"

  # Tauri Rust backend
  - package-ecosystem: cargo
    directory: /src/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
    groups:
      cargo-all:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
